server {
    listen 8888 default_server;
    listen [::]:8888 default_server;
    modsecurity on;
    modsecurity_rules_file /etc/nginx/modsecurity.conf;

    root /var/www/html;
    index index.html index.htm;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:4280\;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
